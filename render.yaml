services:
  - type: web
    name: arandacalzado-back
    env: python
    buildCommand: pip install -r requirements.txt && python arandaCalzado/manage.py collectstatic --no-input && python arandaCalzado/manage.py migrate
    startCommand: gunicorn arandaCalzado.wsgi:application --chdir arandaCalzado
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: "*"
      - key: DATABASE_URL
        fromDatabase:
          name: arandacalzado-db
          property: connectionString

databases:
  - name: arandacalzado-db
    plan: free
